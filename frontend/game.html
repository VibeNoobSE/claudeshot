<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudeshot — Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-center">
    <div class="container game-container">
      <h1 class="logo">Claudeshot</h1>
      <p class="tagline">
        <svg class="claude-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <ellipse cx="12" cy="12" rx="2.8" ry="8.2" fill="currentColor" transform="rotate(0 12 12)"/>
          <ellipse cx="12" cy="12" rx="2.8" ry="8.2" fill="currentColor" transform="rotate(60 12 12)"/>
          <ellipse cx="12" cy="12" rx="2.8" ry="8.2" fill="currentColor" transform="rotate(120 12 12)"/>
        </svg>
        Longshot powered by Claude
      </p>

      <div class="card game-card">
        <div id="round-indicator" style="font-size:0.85rem;color:#8892a4;font-weight:700;letter-spacing:1px;margin-bottom:0.25rem;min-height:1.2em;"></div>

        <div id="game-area">
          <p class="waiting-msg">Game is loading...</p>
        </div>

        <div id="round-overlay" class="hidden" style="margin-top:1rem;padding:1.25rem 1.5rem;background:rgba(15,23,42,0.95);border-radius:10px;border:1px solid rgba(255,255,255,0.08);min-width:260px;">
          <p id="round-overlay-title" style="font-size:1.1rem;font-weight:900;color:#f7c948;text-align:center;margin-bottom:0.75rem;"></p>
          <ol id="round-overlay-scores" style="list-style:none;padding:0;margin:0 0 0.75rem;display:flex;flex-direction:column;gap:0.3rem;"></ol>
          <p id="round-overlay-next" style="font-size:0.8rem;color:#8892a4;text-align:center;"></p>
        </div>

        <div id="host-end-controls" class="hidden">
          <button id="end-btn" class="btn btn-danger">End Game</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="config.js"></script>
  <script src="games/snake-client.js"></script>
  <script src="games/hungry-client.js"></script>
  <script src="game.js"></script>
</body>
</html>
