<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudeshot — Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-center">
    <div class="container game-container">
      <h1 class="logo">Claudeshot</h1>

      <div class="card game-card">
        <div id="game-area">
          <p class="waiting-msg">Game is loading...</p>
        </div>

        <div id="host-end-controls" class="hidden">
          <button id="end-btn" class="btn btn-danger">End Game</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="config.js"></script>
  <script src="games/snake-client.js"></script>
  <script src="game.js"></script>
</body>
</html>
