<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudeshot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-center">
    <div class="container home-container">
      <h1 class="logo">Claudeshot</h1>
      <p class="tagline">
        <svg class="claude-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <ellipse cx="12" cy="12" rx="2.8" ry="8.2" fill="currentColor" transform="rotate(0 12 12)"/>
          <ellipse cx="12" cy="12" rx="2.8" ry="8.2" fill="currentColor" transform="rotate(60 12 12)"/>
          <ellipse cx="12" cy="12" rx="2.8" ry="8.2" fill="currentColor" transform="rotate(120 12 12)"/>
        </svg>
        Longshot powered by Claude
      </p>

      <div class="card">
        <input
          type="text"
          id="name-input"
          placeholder="Enter your name"
          maxlength="20"
          autocomplete="off"
        />

        <p class="label" style="margin-bottom:0.4rem;">Choose a game</p>
        <div class="game-picker">
          <button class="game-card active" data-game="snake">
            <span class="game-card-icon">🐍</span>
            <span class="game-card-name">Snake</span>
          </button>
          <button class="game-card" data-game="hungry">
            <span class="game-card-icon">🍗</span>
            <span class="game-card-name">Hungry Lasse</span>
          </button>
        </div>

        <div id="more-games" class="hidden">
          <p class="label" style="margin-bottom:0.4rem;">Multiplayer ready</p>
          <div class="game-picker">
            <button class="game-card" data-game="paint">
              <span class="game-card-icon">🎨</span>
              <span class="game-card-name">Paint Battle</span>
            </button>
            <button class="game-card" data-game="royale">
              <span class="game-card-icon">💀</span>
              <span class="game-card-name">Battle Royale</span>
            </button>
            <button class="game-card" data-game="typing">
              <span class="game-card-icon">⌨️</span>
              <span class="game-card-name">Typing Race</span>
            </button>
            <button class="game-card" data-game="flappy">
              <span class="game-card-icon">🐦</span>
              <span class="game-card-name">Flappy</span>
            </button>
          </div>

          <p class="label" style="margin-top:1rem;margin-bottom:0.4rem;">Game showcase (50+ prototypes)</p>
          <a href="games/phaser/index.html" class="showcase-link">
            Open the full game showcase &rarr;
          </a>
          <p class="showcase-hint">Browse 50+ game prototypes ready to be extended into multiplayer Claudeshot games.</p>
        </div>

        <button id="discover-btn" class="btn-discover">
          <span id="discover-text">Discover more games</span>
        </button>

        <button id="create-btn" class="btn btn-primary">Create Room</button>

        <div class="divider">or join with a code</div>

        <div class="join-row">
          <input
            type="text"
            id="code-input"
            placeholder="XXXXXX"
            maxlength="6"
            autocomplete="off"
          />
          <button id="join-btn" class="btn btn-secondary">Join</button>
        </div>

        <p id="error-msg" class="error hidden"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="config.js"></script>
  <script src="home.js"></script>
</body>
</html>
