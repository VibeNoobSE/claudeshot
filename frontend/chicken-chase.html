<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hans vs Chicken</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #fff;
      overflow: hidden;
    }
    h1 { color: #f7c948; font-size: 28px; margin-bottom: 10px; }
    #info { color: #888; font-size: 14px; margin-bottom: 10px; }
    canvas {
      border-radius: 12px;
      border: 2px solid #2a3a5e;
      cursor: none;
    }
    #score-display {
      margin-top: 10px;
      font-size: 18px;
      color: #4ecca3;
    }
  </style>
</head>
<body>
  <h1>HANS vs THE CHICKEN</h1>
  <div id="info">Arrow keys / WASD to chase the chicken. Catch it to eat!</div>
  <canvas id="game" width="800" height="500"></canvas>
  <div id="score-display">Chickens eaten: 0</div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;

    // Load images
    const hansImg = new Image();
    hansImg.src = "assets/hans.webp";
    const chickenImg = new Image();
    chickenImg.src = "assets/chicken.jpg";

    let loaded = 0;
    hansImg.onload = chickenImg.onload = () => { if (++loaded === 2) requestAnimationFrame(loop); };

    // Game state
    const hans = { x: 100, y: H / 2, size: 70, vx: 0, vy: 0, mouthOpen: 0, eating: false, eatTimer: 0 };
    const chicken = { x: W - 150, y: H / 2, size: 55, vx: 0, vy: 0, alive: true, respawnTimer: 0, panic: 0 };
    let score = 0;
    let particles = [];
    let crumbs = [];
    let shakeTimer = 0;
    const keys = {};

    // Stars background
    const stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.5 + 0.5, speed: Math.random() * 0.3 + 0.1,
    }));

    document.addEventListener("keydown", e => {
      keys[e.key] = true;
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    });
    document.addEventListener("keyup", e => { keys[e.key] = false; });

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function update() {
      // Hans movement
      const speed = 4.5;
      let ax = 0, ay = 0;
      if (keys["ArrowLeft"] || keys["a"]) ax -= 1;
      if (keys["ArrowRight"] || keys["d"]) ax += 1;
      if (keys["ArrowUp"] || keys["w"]) ay -= 1;
      if (keys["ArrowDown"] || keys["s"]) ay += 1;
      // Normalize diagonal
      if (ax !== 0 && ay !== 0) { ax *= 0.707; ay *= 0.707; }
      hans.vx = hans.vx * 0.8 + ax * speed * 0.5;
      hans.vy = hans.vy * 0.8 + ay * speed * 0.5;
      hans.x = Math.max(hans.size / 2, Math.min(W - hans.size / 2, hans.x + hans.vx));
      hans.y = Math.max(hans.size / 2, Math.min(H - hans.size / 2, hans.y + hans.vy));

      // Mouth animation
      hans.mouthOpen = Math.max(0, hans.mouthOpen - 0.05);
      if (hans.eating) {
        hans.eatTimer--;
        hans.mouthOpen = Math.abs(Math.sin(hans.eatTimer * 0.3)) * 0.5;
        if (hans.eatTimer <= 0) hans.eating = false;
      }

      // Chicken AI
      if (chicken.alive) {
        const dx = hans.x - chicken.x;
        const dy = hans.y - chicken.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Panic increases as Hans gets closer
        chicken.panic = Math.max(0, 1 - dist / 300);

        if (dist < 250) {
          // Run away from Hans
          const fleeSpeed = 3 + chicken.panic * 3;
          const nx = -dx / (dist || 1);
          const ny = -dy / (dist || 1);
          // Add some wobble
          const wobble = Math.sin(Date.now() * 0.01) * 1.5;
          chicken.vx += (nx * fleeSpeed + wobble) * 0.15;
          chicken.vy += (ny * fleeSpeed + Math.cos(Date.now() * 0.013) * 1.2) * 0.15;
        } else {
          // Wander
          chicken.vx += (Math.random() - 0.5) * 0.3;
          chicken.vy += (Math.random() - 0.5) * 0.3;
        }

        // Damping
        chicken.vx *= 0.92;
        chicken.vy *= 0.92;
        // Speed limit
        const cSpeed = Math.sqrt(chicken.vx ** 2 + chicken.vy ** 2);
        if (cSpeed > 5) { chicken.vx *= 5 / cSpeed; chicken.vy *= 5 / cSpeed; }

        chicken.x = Math.max(chicken.size / 2, Math.min(W - chicken.size / 2, chicken.x + chicken.vx));
        chicken.y = Math.max(chicken.size / 2, Math.min(H - chicken.size / 2, chicken.y + chicken.vy));

        // Bounce off walls
        if (chicken.x <= chicken.size / 2 || chicken.x >= W - chicken.size / 2) chicken.vx *= -1.2;
        if (chicken.y <= chicken.size / 2 || chicken.y >= H - chicken.size / 2) chicken.vy *= -1.2;

        // Catch check
        if (dist < (hans.size + chicken.size) * 0.35) {
          eatChicken();
        }
      } else {
        chicken.respawnTimer--;
        if (chicken.respawnTimer <= 0) {
          chicken.alive = true;
          chicken.x = Math.random() * (W - 200) + 100;
          chicken.y = Math.random() * (H - 200) + 100;
          // Make sure it's not too close to Hans
          const dx = hans.x - chicken.x;
          const dy = hans.y - chicken.y;
          if (Math.sqrt(dx * dx + dy * dy) < 200) {
            chicken.x = hans.x > W / 2 ? 100 : W - 100;
          }
          chicken.vx = 0;
          chicken.vy = 0;
        }
      }

      // Particles
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life -= 0.02;
        return p.life > 0;
      });

      // Crumbs
      crumbs = crumbs.filter(c => {
        c.x += c.vx;
        c.y += c.vy;
        c.vy += 0.1;
        c.life -= 0.015;
        c.rotation += c.rotSpeed;
        return c.life > 0;
      });

      // Screen shake
      if (shakeTimer > 0) shakeTimer--;

      // Stars twinkle
      stars.forEach(s => { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } });
    }

    function eatChicken() {
      chicken.alive = false;
      chicken.respawnTimer = 90;
      hans.eating = true;
      hans.eatTimer = 30;
      hans.mouthOpen = 0.5;
      score++;
      shakeTimer = 8;
      document.getElementById("score-display").textContent = `Chickens eaten: ${score}`;

      // Explosion particles
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        particles.push({
          x: chicken.x, y: chicken.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          life: 1,
          color: ["#f7c948", "#e94560", "#ff8c42", "#c8a060"][Math.floor(Math.random() * 4)],
          size: 3 + Math.random() * 5,
        });
      }

      // Chicken crumbs flying
      for (let i = 0; i < 8; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        crumbs.push({
          x: chicken.x, y: chicken.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 3,
          life: 1,
          size: 8 + Math.random() * 12,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.2,
        });
      }
    }

    function draw() {
      ctx.save();

      // Screen shake
      if (shakeTimer > 0) {
        ctx.translate(
          (Math.random() - 0.5) * shakeTimer * 1.5,
          (Math.random() - 0.5) * shakeTimer * 1.5
        );
      }

      // Background
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, W, H);

      // Stars
      stars.forEach(s => {
        ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(Date.now() * 0.003 + s.x) * 0.2})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });

      // Ground
      ctx.fillStyle = "#1a2744";
      ctx.fillRect(0, H - 30, W, 30);
      for (let i = 0; i < W; i += 40) {
        ctx.fillStyle = "#1e3050";
        ctx.fillRect(i, H - 30, 20, 3);
      }

      // Chicken crumbs (drawn as mini chicken bits)
      crumbs.forEach(c => {
        ctx.save();
        ctx.globalAlpha = c.life;
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rotation);
        ctx.drawImage(chickenImg, -c.size / 2, -c.size / 2, c.size, c.size);
        ctx.restore();
      });

      // Chicken
      if (chicken.alive) {
        ctx.save();
        const wobble = Math.sin(Date.now() * 0.008) * 3;
        const panicWobble = chicken.panic * Math.sin(Date.now() * 0.03) * 5;
        const s = chicken.size;

        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(chicken.x, chicken.y + s / 2 + 5, s * 0.4, 6, 0, 0, Math.PI * 2);
        ctx.fill();

        // Sweat drops when panicking
        if (chicken.panic > 0.5) {
          ctx.fillStyle = "#5dade2";
          const sweatY = -s / 2 - 5 + Math.sin(Date.now() * 0.01) * 3;
          ctx.beginPath();
          ctx.ellipse(chicken.x + s / 3, chicken.y + sweatY, 3, 4, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        // Chicken image (flip based on direction)
        ctx.translate(chicken.x, chicken.y + wobble + panicWobble);
        if (chicken.vx > 0.3) ctx.scale(-1, 1);
        // Bounce animation
        const bounce = Math.abs(Math.sin(Date.now() * 0.006)) * 4 * (0.3 + chicken.panic);
        ctx.drawImage(chickenImg, -s / 2, -s / 2 - bounce, s, s);
        ctx.restore();
      }

      // Particles
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      // Hans
      ctx.save();
      const hs = hans.size;
      const bobY = Math.sin(Date.now() * 0.005) * 2;
      const moveSpeed = Math.sqrt(hans.vx ** 2 + hans.vy ** 2);
      const runBob = Math.sin(Date.now() * 0.015) * moveSpeed * 2;

      // Shadow
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.beginPath();
      ctx.ellipse(hans.x, hans.y + hs / 2 + 5, hs * 0.35, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      // Hans image (circular crop)
      ctx.save();
      ctx.translate(hans.x, hans.y + bobY + runBob);

      // Flip based on direction
      if (hans.vx < -0.3) ctx.scale(-1, 1);

      // Circular clip for the face
      ctx.beginPath();
      ctx.arc(0, 0, hs / 2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(hansImg, -hs / 2, -hs / 2, hs, hs);
      ctx.restore();

      // Border ring
      ctx.strokeStyle = hans.eating ? "#f7c948" : "#4ecca3";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(hans.x, hans.y + bobY + runBob, hs / 2, 0, Math.PI * 2);
      ctx.stroke();

      // Mouth (opens when eating or close to chicken)
      if (hans.mouthOpen > 0.05 || (chicken.alive && getDistToChicken() < 150)) {
        const mouthSize = hans.mouthOpen > 0.05 ? hans.mouthOpen : Math.max(0, (150 - getDistToChicken()) / 150) * 0.3;
        ctx.fillStyle = "#1a1a1a";
        const mouthY = hans.y + bobY + runBob + hs * 0.2;
        const mouthX = hans.vx < -0.3 ? hans.x - hs * 0.15 : hans.x + hs * 0.15;
        ctx.beginPath();
        ctx.ellipse(mouthX, mouthY, 6 + mouthSize * 10, 4 + mouthSize * 8, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // "NOM" text when eating
      if (hans.eating) {
        ctx.fillStyle = "#f7c948";
        ctx.font = `bold ${20 + hans.eatTimer}px monospace`;
        ctx.textAlign = "center";
        ctx.shadowColor = "#000";
        ctx.shadowBlur = 5;
        ctx.fillText("NOM!", hans.x, hans.y - hs / 2 - 15 - hans.eatTimer * 0.5);
        ctx.shadowBlur = 0;
      }

      ctx.restore();

      // Score big if recently eaten
      if (hans.eating) {
        ctx.fillStyle = "#f7c948";
        ctx.font = "bold 20px monospace";
        ctx.textAlign = "center";
        ctx.fillText(`+1 CHICKEN`, W / 2, 40);
      }

      // Instructions when chicken is respawning
      if (!chicken.alive) {
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.font = "16px monospace";
        ctx.textAlign = "center";
        const dots = ".".repeat(Math.floor(Date.now() / 300) % 4);
        ctx.fillText(`Chicken respawning${dots}`, W / 2, 40);
      }

      ctx.restore();
    }

    function getDistToChicken() {
      if (!chicken.alive) return 999;
      return Math.sqrt((hans.x - chicken.x) ** 2 + (hans.y - chicken.y) ** 2);
    }
  </script>
</body>
</html>
